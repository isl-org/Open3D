name: Ubuntu
permissions: {}

on:
  workflow_dispatch:
    inputs:
      developer_build:
        description: 'Set to OFF for Release wheels'
        required: false
        default: 'ON'
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    permissions:
      contents: write  # Release upload
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        BUILD_SHARED_LIBS: [ON, OFF]
    env:
      BUILD_SHARED_LIBS: ${{ matrix.BUILD_SHARED_LIBS }}
      MLOPS: ${{ matrix.BUILD_SHARED_LIBS }}   # Build Torch and TF ops if shared libs
      BUILD_CUDA_MODULE: OFF
      DEVELOPER_BUILD: ${{ github.event.inputs.developer_build || 'ON' }}
      OPEN3D_CPU_RENDERING: true
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Maximize build space
        run: |
          source util/ci_utils.sh
          maximize_ubuntu_github_actions_build_space
      - name: Docker build
        run: |
          if [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON" ]; then
            docker/docker_build.sh cpu-static
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_build.sh cpu-static-release
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON"  ]; then
            docker/docker_build.sh cpu-shared-ml
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_build.sh cpu-shared-ml-release
          fi
      - name: Docker test
        run: |
          if [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON" ]; then
            docker/docker_test.sh cpu-static
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "OFF" ] && [ "${{ env.MLOPS }}" = "OFF" ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_test.sh cpu-static-release
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "ON"  ]; then
            docker/docker_test.sh cpu-shared-ml
          elif [ "${{ matrix.BUILD_SHARED_LIBS }}" = "ON"  ] && [ "${{ env.MLOPS }}" = "ON"  ] && [ "${{ env.DEVELOPER_BUILD }}" = "OFF" ]; then
            docker/docker_test.sh cpu-shared-ml-release
          fi
      - name: Generate package attestation
        if: ${{ matrix.BUILD_SHARED_LIBS == 'ON' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/open3d-devel-*.tar.xz

      - name: Upload package to GitHub artifacts
        if: ${{ matrix.BUILD_SHARED_LIBS == 'ON' }}
        uses: actions/upload-artifact@v4
        with:
          name: open3d-devel-linux-x86_64
          path: open3d-devel-*.tar.xz
          if-no-files-found: error

      # The wheel is also built as part of the cpu-shared-ml Docker image and
      # is reused by the build-docs job below, avoiding a second Open3D build
      # just for documentation (EGL enables headless notebook rendering with
      # the standard binary; see visualizer/EGLOffscreenContext).
      - name: Upload wheel to GitHub artifacts
        if: ${{ matrix.BUILD_SHARED_LIBS == 'ON' }}
        uses: actions/upload-artifact@v4
        with:
          name: open3d-wheel-linux-x86_64
          path: open3d*.whl
          if-no-files-found: error

      - name: Generate viewer attestation
        if: ${{ matrix.BUILD_SHARED_LIBS == 'OFF' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/open3d-viewer-*-Linux.deb

      - name: Upload viewer to GitHub artifacts
        if: ${{ matrix.BUILD_SHARED_LIBS == 'OFF' }}
        uses: actions/upload-artifact@v4
        with:
          name: open3d-viewer-Linux
          path: open3d-viewer-*-Linux.deb
          if-no-files-found: error
      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ${BUILD_SHARED_LIBS} == 'ON' ] ; then
            .github/workflows/update_release.sh open3d-devel-*.tar.xz
          else
            .github/workflows/update_release.sh open3d-viewer-*-Linux.deb
          fi

  # Builds documentation (Doxygen + Sphinx + Jupyter notebooks) from the
  # standard Open3D Python wheel produced above. EGL-based offscreen
  # rendering means the same wheel (GUI-enabled) supports both notebook
  # execution and visualization.{gui,rendering} API docs, so this replaces
  # the old separate "headless-docs" workflow that built Open3D twice.
  build-docs:
    needs: ubuntu
    permissions:
      contents: write  # Artifact upload and release upload
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest
    env:
      DEVELOPER_BUILD: ${{ github.event.inputs.developer_build || 'ON' }}
    steps:
      - name: Checkout Open3D source code
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: open3d-wheel-linux-x86_64

      - name: Checkout Open3D-ML
        run: git clone --depth 1 https://github.com/isl-org/Open3D-ML.git -b main /tmp/Open3D-ML

      - name: Install doc dependencies
        run: |
          source util/ci_utils.sh
          install_docs_dependencies /tmp/Open3D-ML

      - name: Install Open3D wheel
        run: python -m pip install open3d*.whl

      - name: Build docs
        run: |
          source util/ci_utils.sh
          build_docs "${DEVELOPER_BUILD}"
          tar -C docs/_out -czvf open3d-${GITHUB_SHA}-docs.tar.gz html

      - name: Generate docs attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/open3d-${{ github.sha }}-docs.tar.gz

      - name: Upload docs
        uses: actions/upload-artifact@v4
        with:
          name: open3d-${{ github.sha }}-docs
          path: open3d-${{ github.sha }}-docs.tar.gz
          if-no-files-found: error
          compression-level: 0 # no compression

      - name: Update devel release
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .github/workflows/update_release.sh open3d-${{ github.sha }}-docs.tar.gz
